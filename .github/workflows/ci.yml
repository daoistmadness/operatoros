name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: backend
    env:
      PYTHONPATH: src
      DATABASE_URL: sqlite:///./ci-test.db
      AUTH_COOKIE_SECRET: ci-backend-test-secret-at-least-32-characters
      ENABLE_DESTRUCTIVE_OPERATIONS: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: python -c "from src.main import app; assert app is not None; routes = {route.path for route in app.routes}; assert '/api/system/clear-data' in routes; assert '/api/system/health' in routes"
      - run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker/application configuration contract
        run: python .github/scripts/check_docker_contract.py
      - name: Validate Compose configuration
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-compose-validation-only
          POSTGRES_DB: absensi
          POSTGRES_HOST: db
          POSTGRES_PORT: "5432"
          AUTH_COOKIE_SECRET: ci-compose-validation-secret-not-used-at-runtime
          ASTRYX_SETUP_TOKEN: ci-compose-setup-token-not-used-at-runtime
          VITE_API_BASE_URL: ""
        run: docker compose config

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate relative Markdown links
        run: python .github/scripts/check_markdown_links.py

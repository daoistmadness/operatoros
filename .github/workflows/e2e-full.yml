name: E2E Full Regression

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: e2e-full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-full:
    name: Ubuntu / Bun 1.3.14 / Node 22.23.1 / Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      PYTHONPATH: backend/src
      ENABLE_DESTRUCTIVE_OPERATIONS: "false"
      OPERATOROS_E2E_ADMIN_USERNAME: operatoros_e2e_admin
      OPERATOROS_E2E_ADMIN_PASSWORD: "E2E-Admin-2026-Secure!"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js 22.23.1 fallback
        uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Bun 1.3.14
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip
          backend/.venv/bin/python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run CI-only full regression
        run: timeout 900 make e2e-full

      - name: Upload concise E2E summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operatoros-e2e-summaries
          path: |
            e2e-results/summary.txt
            e2e-results/full-summary.txt
            e2e-results/database-before.json
            e2e-results/database-after.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload E2E failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: operatoros-e2e-failure-evidence
          path: |
            e2e-results/logs/
            e2e-results/junit/
            e2e-results/playwright/
          if-no-files-found: warn
          retention-days: 7

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OperatorOS - Starting Up</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f9fafb;
        color: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      main {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        padding: 40px;
        max-width: 480px;
        width: 100%;
        text-align: center;
      }
      .spinner {
        border: 4px solid #f3f4f6;
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      h1 { margin-top: 0; font-size: 1.5rem; }
      p { color: #4b5563; }
      .error-state { display: none; }
      .error-icon {
        background: #fee2e2;
        color: #ef4444;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: bold;
        margin: 0 auto 20px;
      }
      .buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 24px;
      }
      button {
        padding: 10px 16px;
        border-radius: 6px;
        font-weight: 500;
        cursor: pointer;
        border: none;
      }
      .btn-primary {
        background: #3b82f6;
        color: white;
      }
      .btn-primary:hover {
        background: #2563eb;
      }
      .btn-secondary {
        background: #f3f4f6;
        color: #374151;
      }
      .btn-secondary:hover {
        background: #e5e7eb;
      }
      #state {
        font-family: monospace;
        background: #f3f4f6;
        padding: 4px 8px;
        border-radius: 4px;
        display: inline-block;
        margin-top: 12px;
      }
      #error-message {
        color: #ef4444;
        margin-top: 12px;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="loading-view">
        <div class="spinner"></div>
        <h1>Starting OperatorOS</h1>
        <p>Please wait while the local environment is prepared...</p>
        <div id="state">STARTING</div>
      </div>
      
      <div id="error-view" class="error-state">
        <div class="error-icon">!</div>
        <h1>Startup Failed</h1>
        <p>The local backend could not start safely.</p>
        <div id="error-state-label" style="font-family: monospace; background: #f3f4f6; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 12px;">FAILED</div>
        <p id="error-message"></p>
        <div class="buttons">
          <button class="btn-primary" onclick="retry()">Retry</button>
          <button class="btn-secondary" onclick="exit()">Exit</button>
        </div>
      </div>
    </main>
    <script>
      const { invoke } = window.__TAURI__.core;
      
      const loadingView = document.getElementById('loading-view');
      const errorView = document.getElementById('error-view');
      const stateLabel = document.getElementById('state');
      const errorStateLabel = document.getElementById('error-state-label');
      const errorMessage = document.getElementById('error-message');
      
      let pollInterval;
      
      function updateUI(payload) {
        const state = payload.state;
        const msg = payload.message;
        
        if (state === 'READY') {
          clearInterval(pollInterval);
          invoke('launch_main_window');
          return;
        }
        
        if (['FAILED', 'CRASHED', 'BACKEND_FAILED', 'READINESS_TIMEOUT', 'PORT_CONFLICT', 'FATAL_CONFIGURATION_ERROR'].includes(state)) {
          clearInterval(pollInterval);
          loadingView.style.display = 'none';
          errorView.style.display = 'block';
          errorStateLabel.textContent = state;
          errorMessage.textContent = msg || 'Unknown error occurred.';
        } else {
          loadingView.style.display = 'block';
          errorView.style.display = 'none';
          stateLabel.textContent = state;
        }
      }

      function pollState() {
        invoke('get_lifecycle_state')
          .then((res) => {
            updateUI(res);
          })
          .catch((err) => {
            console.error('Error polling state:', err);
          });
      }

      function retry() {
        loadingView.style.display = 'block';
        errorView.style.display = 'none';
        stateLabel.textContent = 'RESTARTING';
        invoke('retry_startup').then(() => {
          pollInterval = setInterval(pollState, 500);
        });
      }

      function exit() {
        invoke('exit_application');
      }

      pollInterval = setInterval(pollState, 500);
      pollState();
    </script>
  </body>
</html>
